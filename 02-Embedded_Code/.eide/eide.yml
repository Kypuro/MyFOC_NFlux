            - path: Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_opamp_ex.c
            - path: Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_tim.c
            - path: Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_tim_ex.c
            - path: Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_uart.c
            - path: Drivers/STM32G4xx_HAL_Driver/Src/stm32g4xx_hal_uart_ex.c
          folders: []
        - name: CMSIS
          files:
            - path: Core/Src/system_stm32g4xx.c
          folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: 78b32c09da0a09e316d3e94d6fc001d4
targets:
  My_FOC:
    cppPreprocessAttrs:
      defineList:
        - USE_HAL_DRIVER
        - STM32G431xx
      incList:
        - Core/Inc
        - Drivers/STM32G4xx_HAL_Driver/Inc
        - Drivers/STM32G4xx_HAL_Driver/Inc/Legacy
        - Drivers/CMSIS/Device/ST/STM32G4xx/Include
        - Drivers/CMSIS/Include
        - .cmsis/include
        - MDK-ARM/RTE/_My_FOC
        - Matlab
      libList:
        - Matlab
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: AC5
    toolchainConfigMap:
      AC5:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 4
          afterBuildTasks: []
          asm-compiler:
            defines: []
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: --diag_suppress=1 --diag_suppress=1295
            C_FLAGS: --diag_suppress=1 --diag_suppress=1295
            c99-mode: true
            one-elf-section-per-function: true
            optimization: level-3
            warnings: all-warnings
          global:
            output-debug-info: enable
            use-microLIB: false
          linker:
            $outputTaskExcludes:
              - .bin
            output-format: elf
            ro-base: ""
            rw-base: ""
            xo-base: ""
        scatterFilePath: ""
        storageLayout:
          RAM:
            - id: 1
              isChecked: true
              mem:
                size: "0x00008000"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: true
              isStartup: true
              mem:
                size: "0x00020000"
                startAddr: "0x08000000"
              tag: IROM
        useCustomScatterFile: false
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
      STLink:
        address: "0x08000000"
        bin: ""
        elFile: None
        optionBytes: .eide/my_foc.st.option.bytes.ini
        otherCmds: ""
        proType: SWD
        resetMode: default
        runAfterProgram: true
        speed: 4000
    uploader: STLink
